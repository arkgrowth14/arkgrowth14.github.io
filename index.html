<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ark Growth | Strategic Financial Consulting</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-bg: #F3EFE0;
            --brand-gold: #B8860B;
            --brand-text: #1A1A1A;
            --brand-muted: #5E5E5E;
            --btn-orange: #F3B664;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; 
            background-color: var(--brand-bg); 
            color: var(--brand-text);
            overflow-x: hidden;
        }

        /* --- THE NAVIGATION BAR FIX --- */
        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between; /* Pushes Logo Left, Menu Right */
            padding: 20px 4%;
            background-color: var(--brand-bg);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            min-width: max-content; /* Prevents logo from squishing */
        }

        .logo-group img {
            height: 45px;
            mix-blend-multiply: multiply;
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: var(--brand-text);
            letter-spacing: 2px;
            text-transform: uppercase;
            white-space: nowrap; /* FORCES ONE LINE */
        }

        /* MENU LINKS */
        .nav-menu {
            display: flex;
            align-items: center;
            gap: 35px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-menu a {
            text-decoration: none;
            color: var(--brand-text);
            font-size: 0.95rem;
            font-weight: 400;
            transition: color 0.3s;
        }

        .nav-menu a:hover { color: var(--brand-gold); }

        .btn-cta {
            background-color: var(--btn-orange);
            color: white !important;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* --- MAIN CONTENT --- */
        .container { 
            max-width: 1100px; 
            margin: 100px auto; 
            padding: 0 24px;
        }

        .strategy-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .service-card {
            background: #FFFFFF;
            padding: 50px 40px;
            border-top: 5px solid var(--brand-gold);
            box-shadow: 0 15px 40px rgba(0,0,0,0.04);
        }

        h2 { font-family: 'Playfair Display', serif; margin-top: 0; font-size: 1.8rem; }

        /* --- THE BULLETPROOF SUN SEAL --- */
        .final-seal {
            text-align: center;
            padding: 120px 0;
        }

        .sun-svg {
            width: 70px;
            height: 70px;
            fill: var(--brand-gold);
            animation: slowRotate 25s linear infinite;
        }

        @keyframes slowRotate {
            from { transform: rotate(0deg); } to { transform: rotate(360deg); }
        }

        /* --- MOBILE LAYOUT --- */
        @media (max-width: 900px) {
            .nav-container { flex-direction: column; gap: 20px; padding: 20px; }
            .nav-menu { gap: 15px; flex-wrap: wrap; justify-content: center; }
            .strategy-grid { grid-template-columns: 1fr; }
            .logo-text { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <nav class="nav-container">
        <a href="#" class="logo-group">
            <img src="1.jpg" alt="Ark Growth Logo">
            <span class="logo-text">Ark Growth</span>
        </a>

        <ul class="nav-menu">
            <li><a href="#about">About</a></li>
            <li><a href="#services">Services</a></li>
            <li><a href="#contact">Contact</a></li>
            <li><a href="#" class="btn-cta">Get In Touch</a></li>
        </ul>
    </nav>

    <main class="container">
        <div class="strategy-grid">
            <div class="service-card">
                <h2>Comprehensive Advisory</h2>
                <p>Strategic oversight for long-term wealth preservation and growth architecture.</p>
            </div>
            <div class="service-card">
                <h2>Wealth Architecture</h2>
                <p>Designing custom structural frameworks to maximize capital efficiency.</p>
            </div>
        </div>

        <div class="final-seal">
            <svg class="sun-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
            </svg>
            <p style="letter-spacing: 5px; color: var(--brand-gold); font-size: 11px; margin-top: 20px; text-transform: uppercase; font-weight: 600;">Ark Growth Strategy</p>
        </div>
    </main>

</body>
</html>
