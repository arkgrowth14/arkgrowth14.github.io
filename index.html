<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ark Growth | Strategic Financial Consulting</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-bg: #F3EFE0;
            --brand-gold: #B8860B;
            --brand-text: #1A1A1A;
            --brand-muted: #5E5E5E;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: var(--brand-bg);
            color: var(--brand-text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- ROBUST FADE-IN ANIMATIONS --- */
        @keyframes logoEntrance {
            0% { 
                opacity: 0; 
                transform: translateY(20px); 
                filter: blur(5px);
            }
            100% { 
                opacity: 1; 
                transform: translateY(0); 
                filter: blur(0);
            }
        }

        @keyframes subtleSlide {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .hero img {
            width: 100%;
            max-width: 500px;
            mix-blend-multiply: multiply; 
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.05));
            /* Animation Trigger */
            animation: logoEntrance 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0; 
        }

        .tagline {
            font-family: 'Playfair Display', serif;
            margin-top: 24px;
            font-size: 1.2rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--brand-muted);
            font-weight: 400;
            /* Delayed Animation */
            animation: logoEntrance 1.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
            opacity: 0;
        }

        /* --- CALL TO ACTION BUTTON --- */
        .cta-button {
            margin-top: 40px;
            padding: 12px 30px;
            border: 1px solid var(--brand-gold);
            color: var(--brand-gold);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s ease;
            animation: logoEntrance 1.8s cubic-bezier(0.16, 1, 0.3, 1) 0.8s both;
        }

        .cta-button:hover {
            background: var(--brand-gold);
            color: white;
        }

        /* --- CONTENT SECTION --- */
        .container { 
            max-width: 900px; 
            margin: 0 auto 100px auto; 
            padding: 0 20px;
            animation: subtleSlide 1s ease-out 1.2s both; 
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 50px;
            height: 2px;
            background: var(--brand-gold);
            margin: 15px auto 0;
        }

        /* --- REPOSITORY CARDS --- */
        #file-list { 
            list-style: none; 
            padding: 0; 
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        li { 
            background: #FFFFFF; 
            padding: 30px; 
            border-radius: 2px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            border-bottom: 3px solid transparent;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        li:hover { 
            transform: translateY(-8px);
            border-bottom: 3px solid var(--brand-gold);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        .file-name {
            color: var(--brand-text);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 10px;
            display: block;
        }

        .file-category {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--brand-gold);
            margin-bottom: 5px;
        }

        .scroll-hint {
            position: absolute;
            bottom: 40px;
            font-size: 0.65rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.5;
        }

        @media (max-width: 600px) {
            .hero img { max-width: 320px; }
            .tagline { font-size: 0.9rem; letter-spacing: 0.15em; }
        }
    </style>
</head>
<body>

    <header class="hero">
        <img src="1.jpg" alt="Ark Growth Logo">
        <p class="tagline">Strategic Financial Illumination</p>
        
        <a href="mailto:contact@arkgrowth.com" class="cta-button">Book 15-Min Intro Call</a>
        
        <div class="scroll-hint">Scroll to Portfolio</div>
    </header>

    <main class="container">
        <h2 class="section-title">Strategic Assets</h2>
        <ul id="file-list">
            <li style="opacity: 0.5; text-align: center;">Analyzing repository...</li>
        </ul>
    </main>

    <script>
        async function fetchFiles() {
            try {
                const response = await fetch('https://api.github.com/repos/arkgrowth14/Ark-Repo/contents/');
                const files = await response.json();
                const listElement = document.getElementById('file-list');
                listElement.innerHTML = '';

                files.forEach(file => {
                    if (file.name !== 'index.html' && !file.name.startsWith('.')) {
                        const li = document.createElement('li');
                        const ext = file.name.split('.').pop().toUpperCase();
                        const type = (ext === 'JS' || ext === 'JSX' || ext === 'CSS') ? 'Technical Asset' : 'Strategy Document';

                        li.innerHTML = `
                            <div>
                                <span class="file-category">${type}</span>
                                <a class="file-name" href="${file.html_url}" target="_blank">${file.name}</a>
                            </div>
                            <small style="color: #999; margin-top: 15px;">View Resource →</small>
                        `;
                        listElement.appendChild(li);
                    }
                });
            } catch (error) {
                document.getElementById('file-list').innerHTML = '<li>Unable to load strategic assets at this time.</li>';
            }
        }
        
        window.onload = fetchFiles;
    </script>
</body>
</html>
