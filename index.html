<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ark Growth | Strategic Financial Consulting</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-bg: #F3EFE0;
            --brand-gold: #B8860B;
            --brand-text: #1A1A1A;
            --brand-muted: #5E5E5E;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; 
            background-color: var(--brand-bg); 
            color: var(--brand-text);
            overflow-x: hidden;
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .logo-wrapper {
            position: relative;
            overflow: hidden; 
            display: inline-block;
            line-height: 0;
            padding: 15px;
        }

        .hero img {
            width: 100%;
            max-width: 450px;
            mix-blend-multiply: multiply;
            display: block;
        }

        /* THE GOLDEN SWEEP */
        .logo-wrapper::after {
            content: "";
            position: absolute;
            top: 0;
            left: -150%;
            width: 65%;
            height: 100%;
            background: linear-gradient(
                to right, 
                rgba(184, 134, 11, 0) 0%, 
                rgba(250, 204, 21, 0.4) 40%, 
                rgba(255, 255, 255, 0.8) 50%, 
                rgba(250, 204, 21, 0.4) 60%, 
                rgba(184, 134, 11, 0) 100%
            );
            transform: skewX(-25deg);
            animation: goldenSweep 7s infinite ease-in-out;
        }

        @keyframes goldenSweep {
            0% { left: -150%; }
            15% { left: 150%; }
            100% { left: 150%; }
        }

        .tagline {
            font-family: 'Playfair Display', serif;
            margin-top: 30px;
            font-size: 1.1rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--brand-muted);
        }

        /* --- CONTENT SECTION --- */
        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 0 24px;
        }

        .strategy-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 35px;
            margin-bottom: 60px;
        }

        .service-card {
            background: #FFFFFF;
            padding: 45px 35px;
            border-top: 4px solid var(--brand-gold);
            box-shadow: 0 12px 35px rgba(0,0,0,0.04);
        }

        h2 { font-family: 'Playfair Display', serif; margin-top: 0; }

        /* --- FINAL SEAL (THE SUN) --- */
        .final-seal {
            text-align: center;
            padding: 80px 0;
            clear: both;
        }

        .sun-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto;
            border: 2px solid var(--brand-gold);
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            /* Added a subtle rotation to keep it "matching your logo" style */
            animation: slowRotate 20s linear infinite;
        }

        .sun-icon::after {
            content: "";
            width: 20px;
            height: 20px;
            background: var(--brand-gold);
            border-radius: 50%;
        }

        @keyframes slowRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .footer-text {
            letter-spacing: 5px; 
            color: var(--brand-gold); 
            font-size: 10px; 
            margin-top: 20px; 
            text-transform: uppercase;
            font-weight: 600;
        }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 768px) {
            .hero { height: 80vh; }
            .hero img { max-width: 310px; }
            .strategy-grid { grid-template-columns: 1fr; gap: 20px; }
            .tagline { font-size: 0.85rem; letter-spacing: 0.2em; }
        }
    </style>
</head>
<body>

    <header class="hero">
        <div class="logo-wrapper">
            <img src="1.jpg" alt="Ark Growth Logo">
        </div>
        <p class="tagline">Strategic Financial Illumination</p>
    </header>

    <main class="container">
        <div class="strategy-grid">
            <div class="service-card">
                <h2>Comprehensive Advisory</h2>
                <p>Strategic oversight for long-term wealth preservation and multi-generational growth architecture.</p>
            </div>
            <div class="service-card">
                <h2>Wealth Architecture</h2>
                <p>Designing custom structural frameworks to maximize capital efficiency and mitigate risk at scale.</p>
            </div>
        </div>

        <div class="final-seal">
            <div class="sun-icon"></div>
            <p class="footer-text">Ark Growth Strategy</p>
        </div>
    </main>

</body>
</html>
