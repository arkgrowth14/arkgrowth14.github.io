<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ark Growth | Strategic Financial Consulting</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-bg: #F3EFE0;
            --brand-gold: #B8860B;
            --brand-gold-light: #FACC15;
            --brand-text: #1A1A1A;
            --brand-muted: #5E5E5E;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; 
            background-color: var(--brand-bg); 
            color: var(--brand-text);
            overflow-x: hidden;
        }

        /* --- HERO & GOLDEN SWEEP --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .logo-wrapper {
            position: relative;
            overflow: hidden; 
            display: inline-block;
            line-height: 0;
            padding: 10px;
        }

        .hero img {
            width: 100%;
            max-width: 450px;
            mix-blend-multiply: multiply;
            display: block;
        }

        .logo-wrapper::after {
            content: "";
            position: absolute;
            top: 0;
            left: -150%;
            width: 60%;
            height: 100%;
            background: linear-gradient(
                to right, 
                rgba(184, 134, 11, 0) 0%, 
                rgba(250, 204, 21, 0.4) 40%, 
                rgba(255, 255, 255, 0.7) 50%, 
                rgba(250, 204, 21, 0.4) 60%, 
                rgba(184, 134, 11, 0) 100%
            );
            transform: skewX(-25deg);
            animation: goldenSweep 6s infinite ease-in-out;
        }

        @keyframes goldenSweep {
            0% { left: -150%; }
            15% { left: 150%; }
            100% { left: 150%; }
        }

        .tagline {
            font-family: 'Playfair Display', serif;
            margin-top: 30px;
            font-size: 1.1rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--brand-muted);
        }

        /* --- STRATEGY SECTION --- */
        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 0 20px;
        }

        .strategy-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .service-card {
            background: #FFFFFF;
            padding: 40px;
            border-top: 4px solid var(--brand-gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }

        /* --- ROTATING GOLD SUN (FOOTER) --- */
        .footer-sun-container {
            padding: 100px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .gold-sun {
            width: 80px;
            height: 80px;
            background: var(--brand-gold);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 20px rgba(184, 134, 11, 0.3);
            /* This animation makes the sun "pulse" and rotate */
            animation: rotateSun 20s linear infinite;
        }

        /* Creating the Rays to match your logo */
        .gold-sun::before {
            content: "";
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 2px dashed var(--brand-gold);
            border-radius: 50%;
            opacity: 0.5;
        }

        @keyframes rotateSun {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .footer-text {
            margin-top: 20px;
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--brand-gold);
            font-weight: 600;
        }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 768px) {
            .hero { height: 75vh; }
            .hero img { max-width: 320px; }
            .strategy-grid { grid-template-columns: 1fr; gap: 20px; }
            .tagline { font-size: 0.85rem; letter-spacing: 0.15em; }
        }
    </style>
</head>
<body>

    <header class="hero">
        <div class="logo-wrapper">
            <img src="1.jpg" alt="Ark Growth Logo">
        </div>
        <p class="tagline">Strategic Financial Illumination</p>
    </header>

    <main class="container">
        <div class="strategy-grid">
            <div class="service-card">
                <h2 style="font-family: 'Playfair Display';">Comprehensive Advisory</h2>
                <p>Strategic oversight for long-term wealth preservation and growth architecture.</p>
            </div>
            <div class="service-card">
                <h2>Wealth Architecture</h2>
                <p>Designing custom frameworks for capital efficiency and risk-adjusted returns.</p>
            </div>
        </div>

        <div class="footer-sun-container">
            <div class="gold-sun"></div>
            <p class="footer-text">Ark Growth Strategy</p>
        </div>
    </main>

</body>
</html>
