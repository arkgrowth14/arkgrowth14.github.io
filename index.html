<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ark Growth Explorer</title>
    <style>
        /* 1. MATCHING YOUR LOGO BACKGROUND */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            background: #F3EFE0; /* Exact match to your logo */
            color: #2D2D2D; 
            scroll-behavior: smooth;
        }

        /* 2. HERO ENTRANCE STYLES */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .hero img {
            width: 100%;
            max-width: 500px;
            /* This helps the logo blend into the background */
            mix-blend-multiply: multiply; 
        }

        .tagline {
            margin-top: 20px;
            font-size: 1.1rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #555;
            font-weight: 300;
        }

        /* 3. REPOSITORY LIST STYLES */
        .container { 
            max-width: 800px; 
            margin: 40px auto; 
            padding: 20px;
        }

        h1 { 
            color: #1A1A1A; 
            border-bottom: 2px solid #E2DCC8; 
            padding-bottom: 10px; 
            font-size: 1.5rem;
        }

        ul { list-style: none; padding: 0; }

        li { 
            background: #FFFFFF; /* White cards for contrast */
            margin: 12px 0; 
            padding: 18px; 
            border-radius: 12px; 
            transition: 0.3s; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        li:hover { 
            transform: translateY(-3px);
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
        }

        a { 
            color: #B8860B; /* Gold/Deep Yellow to match the sun */
            text-decoration: none; 
            font-weight: bold; 
            font-size: 1.1rem; 
        }

        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="hero">
        <img src="1.jpg" alt="Ark Growth Logo">
        <p class="tagline">Illuminating Your Financial Future</p>
        <div class="scroll-indicator">Scroll to Explore Files</div>
    </div>

    <div class="container">
        <h1>Ark Growth | Repository Files</h1>
        <p>Browsing files in: <strong>arkgrowth14/Ark-Repo</strong></p>
        <ul id="file-list">Loading files...</ul>
    </div>

    <script>
        async function fetchFiles() {
            try {
                const response = await fetch('https://api.github.com/repos/arkgrowth14/Ark-Repo/contents/');
                const files = await response.json();
                const listElement = document.getElementById('file-list');
                listElement.innerHTML = '';

                files.forEach(file => {
                    // Ignore index.html and hidden files
                    if (file.name !== 'index.html' && !file.name.startsWith('.')) {
                        const li = document.createElement('li');
                        li.innerHTML = `<a href="${file.html_url}" target="_blank">${file.name}</a>`;
                        listElement.appendChild(li);
                    }
                });
            } catch (error) {
                document.getElementById('file-list').innerHTML = 'Error loading files.';
            }
        }
        fetchFiles();
    </script>
</body>
</html>
