<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ark Growth | Strategic Financial Consulting</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-bg: #F3EFE0;
            --brand-gold: #B8860B;
            --brand-text: #1A1A1A;
            --brand-muted: #5E5E5E;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: var(--brand-bg);
            color: var(--brand-text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- FORCED FADE-IN ANIMATION --- */
        @keyframes logoEntrance {
            0% { opacity: 0; transform: translateY(15px); filter: blur(4px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .hero img {
            width: 90%;
            max-width: 450px;
            mix-blend-multiply: multiply;
            opacity: 0; /* Starts hidden */
        }

        /* This class is added by JavaScript once the page loads */
        .animate-now {
            animation: logoEntrance 1.6s cubic-bezier(0.16, 1, 0.3, 1) forwards !important;
        }

        .tagline {
            font-family: 'Playfair Display', serif;
            margin-top: 20px;
            font-size: 1.1rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--brand-muted);
            opacity: 0;
        }

        /* --- STRATEGY SECTION (RESPONSIVE GRID) --- */
        .container { 
            max-width: 1000px; 
            margin: 0 auto 80px auto; 
            padding: 0 24px;
        }

        .strategy-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Side-by-side on PC */
            gap: 40px;
            margin-top: 50px;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        .service-card {
            background: #FFFFFF;
            padding: 40px 30px;
            border-radius: 2px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            border-top: 3px solid var(--brand-gold);
        }

        /* --- MOBILE FIXES (Phone) --- */
        @media (max-width: 768px) {
            .hero { height: 85vh; } /* Tighter hero on mobile */
            
            .hero img { max-width: 300px; }

            .tagline { 
                font-size: 0.85rem; 
                letter-spacing: 0.15em; 
                padding: 0 10px;
            }

            .strategy-grid {
                grid-template-columns: 1fr; /* Stacked on Phone - NO BLANK SPACE */
                gap: 20px;
            }

            .section-title {
                font-size: 1.5rem;
                text-align: left;
            }

            .container { margin-top: -5vh; } /* Pull content up to reduce gaps */
        }

        .cta-button {
            margin-top: 30px;
            display: inline-block;
            padding: 12px 24px;
            border: 1px solid var(--brand-gold);
            color: var(--brand-gold);
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
            opacity: 0;
        }
    </style>
</head>
<body>

    <header class="hero">
        <img id="main-logo" src="1.jpg" alt="Ark Growth Logo">
        <p id="main-tagline" class="tagline">Strategic Financial Illumination</p>
        <a id="main-cta" href="mailto:contact@arkgrowth.com" class="cta-button">Introductory Call</a>
    </header>

    <main class="container">
        <div class="strategy-grid">
            <div class="service-card">
                <h2 class="section-title">Comprehensive Advisory</h2>
                <p>Strategic oversight for long-term wealth preservation and growth architecture.</p>
            </div>

            <div class="service-card">
                <h2 class="section-title">Wealth Architecture</h2>
                <p>Designing custom frameworks for capital efficiency and risk-adjusted returns.</p>
            </div>
        </div>
    </main>

    <script>
        // FORCING THE FADE-IN ON LOAD
        window.addEventListener('load', () => {
            const logo = document.getElementById('main-logo');
            const tagline = document.getElementById('main-tagline');
            const cta = document.getElementById('main-cta');

            // Trigger animations with slight delays for a "sequence"
            setTimeout(() => logo.classList.add('animate-now'), 100);
            setTimeout(() => tagline.classList.add('animate-now'), 500);
            setTimeout(() => cta.classList.add('animate-now'), 900);
        });
    </script>
</body>
</html>
