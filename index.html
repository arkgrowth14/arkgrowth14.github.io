<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ark Growth | Strategic Financial Consulting</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-bg: #F3EFE0;
            --brand-gold: #B8860B;
            --brand-gold-light: #FACC15;
            --brand-text: #1A1A1A;
            --brand-muted: #5E5E5E;
        }

        * { box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; 
            background-color: var(--brand-bg); 
            color: var(--brand-text);
            overflow-x: hidden;
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        /* LOGO WRAPPER & GOLDEN SWEEP */
        .logo-wrapper {
            position: relative;
            overflow: hidden; 
            display: inline-block;
            line-height: 0;
            padding: 15px;
        }

        .hero img {
            width: 100%;
            max-width: 450px;
            mix-blend-multiply: multiply;
            display: block;
        }

        .logo-wrapper::after {
            content: "";
            position: absolute;
            top: 0;
            left: -150%;
            width: 65%;
            height: 100%;
            background: linear-gradient(
                to right, 
                rgba(184, 134, 11, 0) 0%, 
                rgba(250, 204, 21, 0.4) 40%, 
                rgba(255, 255, 255, 0.8) 50%, 
                rgba(250, 204, 21, 0.4) 60%, 
                rgba(184, 134, 11, 0) 100%
            );
            transform: skewX(-25deg);
            animation: goldenSweep 7s infinite ease-in-out;
        }

        @keyframes goldenSweep {
            0% { left: -150%; }
            15% { left: 150%; }
            100% { left: 150%; }
        }

        .tagline {
            font-family: 'Playfair Display', serif;
            margin-top: 30px;
            font-size: 1.1rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--brand-muted);
            font-weight: 400;
        }

        /* --- STRATEGY SECTION (MOBILE FLAWLESS) --- */
        .container { 
            max-width: 1100px; 
            margin: 0 auto 120px auto; 
            padding: 0 24px;
        }

        .strategy-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 Columns on PC */
            gap: 35px;
        }

        .service-card {
            background: #FFFFFF;
            padding: 45px 35px;
            border-top: 4px solid var(--brand-gold);
            box-shadow: 0 12px 35px rgba(0,0,0,0.04);
            transition: transform 0.3s ease;
        }

        .service-card:hover { transform: translateY(-8px); }

        h2 { 
            font-family: 'Playfair Display', serif; 
            margin-top: 0; 
            font-size: 1.6rem;
            color: var(--brand-text); 
        }

        p { color: var(--brand-muted); font-size: 1.05rem; line-height: 1.7; }

        /* --- THE FIXED ROTATING GOLDEN SUN --- */
        .gold-sun-anchor {
            position: fixed;
            bottom: 35px;
            right: 35px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            text-decoration: none;
        }

        .gold-sun {
            width: 55px;
            height: 55px;
            background: var(--brand-gold);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 20px rgba(184, 134, 11, 0.4);
            animation: rotateSun 18s linear infinite;
        }
